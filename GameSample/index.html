<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Top Down Game</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-stage {
            /* Scale canvas xuống vừa viewport mà không thay đổi logic pixel */
            max-width: 100vw;
            max-height: 100vh;
            line-height: 0;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            /* Giữ tỷ lệ khi viewport nhỏ hơn canvas */
            width: 100%;
            height: auto;
            image-rendering: pixelated;
        }
    </style>
</head>
<body>
<div class="game-stage">
    <canvas id="canvas"></canvas>
</div>

<script src="game_object.js"></script>
<script src="game.js"></script>
<script>
    window.onload = init;
</script>
</body>
</html>
